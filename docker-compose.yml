services:
  app:
    build: .
    container_name: pdf-comp
    restart: unless-stopped
    # Cap memory aggressively for small VPS hosts (Alwyzon XS = 2 GB RAM):
    # baseline + 1 active job ≈ 1.7 GB peak; rest of host stays usable.
    # Increase for bigger boxes if you want more concurrency. If a job
    # spikes past the limit, the kernel OOM-kills the offender (usually
    # Python) and `restart: unless-stopped` brings the container back.
    mem_limit: 1700m
    memswap_limit: 3700m
    ports:
      # Bind only on localhost — your existing reverse proxy on the host
      # connects here. Override with PDF_COMP_PORT env var if 3127 conflicts.
      - "127.0.0.1:${PDF_COMP_PORT:-3127}:3000"
    environment:
      NODE_ENV: production
    # Cap log volume so dockerd's json-file driver can't fill disk.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
