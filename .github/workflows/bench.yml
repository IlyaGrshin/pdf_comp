name: bench

on:
  pull_request:
    branches: [main]
    paths:
      - "scripts/recompress.py"
      - "scripts/requirements.txt"
      - "bench/**"
      - ".github/workflows/bench.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout PR
        uses: actions/checkout@v5
        with:
          path: pr
          fetch-depth: 0

      - name: Checkout base
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Install system deps
        # libvips42 is required by pyvips at runtime (the wheel does not
        # bundle libvips). Mirrors the Dockerfile. Harmless for base venvs
        # that still use Pillow — they ignore the system lib.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qpdf libjpeg-turbo-progs poppler-utils time libvips42

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pr/scripts/requirements.txt
            pr/bench/requirements.txt

      - name: Detect bootstrap mode
        # Bootstrap = base predates bench/. Captured BEFORE mirroring the
        # harness onto base; once mirrored, base/bench/run.py always exists.
        id: bootstrap
        run: |
          if [ -f base/bench/run.py ]; then
            echo "is_bootstrap=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_bootstrap=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Base lacks bench/; running in bootstrap mode (no baseline comparison)."
          fi

      - name: Install PR deps
        run: |
          python -m venv pr/.venv
          pr/.venv/bin/pip install --upgrade pip
          pr/.venv/bin/pip install -r pr/scripts/requirements.txt -r pr/bench/requirements.txt

      - name: Install base deps
        # Separate venv from base's own scripts/requirements.txt — otherwise
        # dep upgrades in the PR would silently apply to the baseline run
        # and mask any regression introduced by the upgrade itself.
        if: steps.bootstrap.outputs.is_bootstrap != 'true'
        run: |
          python -m venv base/.venv
          base/.venv/bin/pip install --upgrade pip
          base/.venv/bin/pip install -r base/scripts/requirements.txt -r pr/bench/requirements.txt

      - name: Generate fixtures (PR)
        run: pr/.venv/bin/python pr/bench/fixtures/generate.py pr/bench/fixtures/out

      - name: Mirror fixtures + bench harness onto base checkout
        # AFTER fixtures are generated, so the copy picks up bench/fixtures/out
        # too — both checkouts must run identical fixtures, otherwise the
        # comparison is meaningless. Harness (.py files) is also mirrored so
        # base's run.py matches the PR's behavior.
        run: |
          mkdir -p base/bench
          cp -r pr/bench/. base/bench/

      - name: Bench PR
        working-directory: pr
        run: .venv/bin/python bench/run.py bench/results.pr.json

      - name: Bench base
        # No continue-on-error: a non-bootstrap base failure must abort the
        # workflow. Otherwise a silently-broken base run would let the gate
        # pass with no comparison.
        if: steps.bootstrap.outputs.is_bootstrap != 'true'
        working-directory: base
        run: .venv/bin/python bench/run.py bench/results.base.json

      - name: Compare
        id: compare
        continue-on-error: true
        run: |
          if [ "${{ steps.bootstrap.outputs.is_bootstrap }}" = "true" ]; then
            pr/.venv/bin/python pr/bench/compare.py pr/bench/results.pr.json | tee comparison.md
          else
            pr/.venv/bin/python pr/bench/compare.py pr/bench/results.pr.json base/bench/results.base.json | tee comparison.md
          fi
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const exitCode = '${{ steps.compare.outputs.exit_code }}';
            const status = exitCode === '0'
              ? 'No regressions past gating thresholds.'
              : 'Regressions detected (see bottom of report).';
            const body = [
              '## Compression bench',
              '',
              status,
              '',
              '```',
              fs.readFileSync('comparison.md', 'utf8').trim(),
              '```',
            ].join('\n');
            // Paginate through all comments — on active PRs the previous
            // sticky comment can be past the first page (default 30).
            const comments = await github.paginate(github.rest.issues.listComments, {
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const existing = comments.find(
              (c) => c.user.type === 'Bot' && c.body && c.body.startsWith('## Compression bench'),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

      - name: Upload results
        uses: actions/upload-artifact@v6
        with:
          name: bench-results
          path: |
            pr/bench/results.pr.json
            base/bench/results.base.json
            comparison.md
          if-no-files-found: warn

      - name: Fail on regression
        if: steps.compare.outputs.exit_code != '0'
        run: |
          echo "compare.py exited ${{ steps.compare.outputs.exit_code }}"
          exit 1
