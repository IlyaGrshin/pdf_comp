name: bench

on:
  pull_request:
    branches: [main]
    paths:
      - "scripts/recompress.py"
      - "scripts/requirements.txt"
      - "bench/**"
      - ".github/workflows/bench.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          path: pr
          fetch-depth: 0

      - name: Checkout base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qpdf libjpeg-turbo-progs poppler-utils time

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pr/scripts/requirements.txt
            pr/bench/requirements.txt

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r pr/scripts/requirements.txt -r pr/bench/requirements.txt

      - name: Generate fixtures (PR)
        run: python pr/bench/fixtures/generate.py pr/bench/fixtures/out

      - name: Mirror fixtures + bench harness onto base checkout
        run: |
          # Use the PR's fixtures and harness on the base too — otherwise the
          # comparison would mix harness changes with compression changes, and
          # if base predates bench/ the run would have nothing to do.
          mkdir -p base/bench
          cp -r pr/bench/. base/bench/

      - name: Bench PR
        working-directory: pr
        run: python bench/run.py bench/results.pr.json

      - name: Bench base
        working-directory: base
        continue-on-error: true
        id: bench_base
        run: python bench/run.py bench/results.base.json

      - name: Compare
        id: compare
        continue-on-error: true
        run: |
          if [ -f base/bench/results.base.json ]; then
            python pr/bench/compare.py pr/bench/results.pr.json base/bench/results.base.json | tee comparison.md
          else
            python pr/bench/compare.py pr/bench/results.pr.json | tee comparison.md
          fi
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const exitCode = '${{ steps.compare.outputs.exit_code }}';
            const status = exitCode === '0'
              ? 'No regressions past gating thresholds.'
              : 'Regressions detected (see bottom of report).';
            const body = [
              '## Compression bench',
              '',
              status,
              '',
              '```',
              fs.readFileSync('comparison.md', 'utf8').trim(),
              '```',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(
              (c) => c.user.type === 'Bot' && c.body && c.body.startsWith('## Compression bench'),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: |
            pr/bench/results.pr.json
            base/bench/results.base.json
            comparison.md
          if-no-files-found: warn

      - name: Fail on regression
        if: steps.compare.outputs.exit_code != '0'
        run: |
          echo "compare.py exited ${{ steps.compare.outputs.exit_code }}"
          exit 1
